<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IMU/GNSS Filter Evaluation</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #11151c;
      }

      #visualizer_canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      #status {
        position: fixed;
        left: 12px;
        bottom: 10px;
        padding: 6px 8px;
        border: 1px solid #3a4554;
        border-radius: 8px;
        color: #e9eef5;
        background: rgba(24, 29, 38, 0.92);
        font: 12px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
  </head>
  <body>
    <canvas id="visualizer_canvas"></canvas>
    <div id="status">Loading filter evaluation...</div>
    <script>
      window.IMU_GNSS_FUSION_CONFIG = window.IMU_GNSS_FUSION_CONFIG || {};
    </script>
    <script src="./local-config.js"></script>
    <script type="module">
      const status = document.getElementById("status");
      const mapboxTokenStorageKey = "imu_gnss_fusion.mapbox_token";
      const themeStorageKey = "imu_gnss_fusion.theme";
      window.__imuGnssFusionInitialMapboxToken = () => {
        const queryToken = new URLSearchParams(window.location.search).get("mapbox_token") || "";
        const config = window.IMU_GNSS_FUSION_CONFIG || {};
        const configToken = String(config.mapboxToken || config.mapbox_token || "").trim();
        const storedToken = window.localStorage.getItem(mapboxTokenStorageKey) || "";
        return queryToken || configToken || storedToken;
      };
      window.__imuGnssFusionRememberMapboxToken = (token) => {
        if (token) {
          window.localStorage.setItem(mapboxTokenStorageKey, token);
        } else {
          window.localStorage.removeItem(mapboxTokenStorageKey);
        }
      };
      window.__imuGnssFusionInitialTheme = () => {
        const queryTheme = new URLSearchParams(window.location.search).get("theme") || "";
        const config = window.IMU_GNSS_FUSION_CONFIG || {};
        const configTheme = String(config.theme || "").trim();
        const storedTheme = window.localStorage.getItem(themeStorageKey) || "";
        return queryTheme || configTheme || storedTheme || "dark";
      };
      window.__imuGnssFusionRememberTheme = (theme) => {
        if (theme) {
          window.localStorage.setItem(themeStorageKey, theme);
        } else {
          window.localStorage.removeItem(themeStorageKey);
        }
      };
      window.__imuGnssFusionBrowserFps = {
        fps: 0,
        emaFps: 0,
        frameCount: 0,
      };
      if (new URLSearchParams(window.location.search).has("bench")) {
        let lastTimestamp = 0;
        const sample = window.__imuGnssFusionBrowserFps;
        const tick = (timestamp) => {
          if (lastTimestamp > 0) {
            const dt = timestamp - lastTimestamp;
            if (dt > 0) {
              sample.fps = 1000 / dt;
              sample.emaFps = sample.emaFps > 0 ? sample.emaFps * 0.9 + sample.fps * 0.1 : sample.fps;
            }
          }
          sample.frameCount += 1;
          lastTimestamp = timestamp;
          window.requestAnimationFrame(tick);
        };
        window.requestAnimationFrame(tick);
      }
      try {
        const cacheBust = String(Date.now());
        const wasm = await import(`./pkg/visualizer.js?v=${cacheBust}`);
        const wasmExports = await wasm.default({
          module_or_path: `./pkg/visualizer_bg.wasm?v=${cacheBust}`,
        });
        window.__imuGnssFusionWasmMemory = wasmExports && wasmExports.memory ? wasmExports.memory : null;
        await wasm.start_visualizer("visualizer_canvas");
        status.remove();
      } catch (error) {
        console.error(error);
        status.textContent = `Failed to start visualizer: ${error}`;
      }
    </script>
  </body>
</html>
